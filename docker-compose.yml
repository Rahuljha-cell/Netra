version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/netra
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=netra-jwt-secret-change-in-production
      - CORS_ORIGIN=http://localhost:3000
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongo
      - redis

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  mongo-data:
