<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>

  <!-- ====== ICON (centered in top area) ====== -->
  <g transform="translate(75, 10) scale(0.75)">
    <!-- Eye shape — filled -->
    <path d="M 16 100 Q 58 38, 100 38 Q 142 38, 184 100 Q 142 162, 100 162 Q 58 162, 16 100 Z"
          fill="#1A237E"/>

    <!-- Eye outline -->
    <path d="M 16 100 Q 58 38, 100 38 Q 142 38, 184 100 Q 142 162, 100 162 Q 58 162, 16 100 Z"
          fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round"/>

    <!-- Iris ring -->
    <circle cx="100" cy="100" r="38" fill="#283593"/>
    <circle cx="100" cy="100" r="38" fill="none" stroke="#FFFFFF" stroke-width="3"/>

    <!-- Map pin as pupil -->
    <path d="M 100 78 C 89 78, 80 86, 80 96 C 80 108, 100 124, 100 124 C 100 124, 120 108, 120 96 C 120 86, 111 78, 100 78 Z"
          fill="#FF8F00"/>

    <!-- Pin dot -->
    <circle cx="100" cy="94" r="6" fill="#FFFFFF"/>

    <!-- Subtle highlight -->
    <ellipse cx="90" cy="88" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- ====== TEXT ====== -->
  <!-- "NETRA" main text -->
  <text x="150" y="210" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="48" letter-spacing="12" fill="url(#textGrad)">NETRA</text>

  <!-- Tagline -->
  <text x="150" y="235" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="12" letter-spacing="3" fill="#FF8F00" opacity="0.85">INDIA'S SAFETY INTELLIGENCE</text>

  <!-- Subtle separator line -->
  <line x1="90" y1="218" x2="210" y2="218" stroke="#1A237E" stroke-width="0.5" opacity="0.2"/>
</svg>